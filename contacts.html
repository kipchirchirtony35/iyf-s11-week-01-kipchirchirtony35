<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="stylesheet" href="contacts.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">About Me</a></li>
              <li><a href="projects.html">Projects</a></li>
              <li><a href="contacts.html">Contact</a></li>
            </ul>
          </nav>
          <h1>Contact Form</h1>
    </header>
  

  <form action="#" method="post">
    <fieldset>
      <legend>Personal Information</legend>

      <label for="fullname">Full Name:</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="yourname@example.com" required><br><br>

      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" placeholder="Optional">
    </fieldset><br><br>
    

    <fieldset>
      <legend>Message Details</legend>

      <label for="subject">Subject:</label>
      <select id="subject" name="subject" required>
        <option value="">Select a subject</option>
        <option value="general">General Inquiry</option>
        <option value="support">Support Request</option>
        <option value="feedback">Feedback</option>
      </select><br><br>

      <label for="message">Message:</label>
      <textarea id="message" name="message" placeholder="Write at least 50 characters" minlength="50" required></textarea>
    </fieldset><br>

    <fieldset>
      <legend>Preferences</legend>
      <label>
        <input type="checkbox" name="newsletter">
        Subscribe to newsletter
      </label>
    </fieldset> <br>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
